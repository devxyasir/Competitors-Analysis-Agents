# Prefect Deployment Configuration
name: competitor-analysis

# Pull step - clone from GitHub using HTTPS
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/devxyasir/Competitors-Analysis-Agents.git
      branch: main

# Deployment definitions
deployments:
  - name: market-discovery-flow
    entrypoint: prefect_workflows/flows/market_discovery.py:market_discovery_flow
    description: Multi-seed market discovery with human-in-the-loop checkpoints
    work_pool:
      name: default-work-pool
    parameters:
      seed_products: []
      scope_config: {}
      breadth: "balanced"
      limits: {}
    enforce_parameter_schema: false
